<!DOCTYPE html>
<html>
<head>
    <title>CyberGuard AI Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
            135deg,
            #1c2331,
            #2c3e50
            );
        }

        .container{

            width:420px;

            background:#ffffff;

            padding:40px;

            border-radius:20px;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.3);

            text-align:center;
        }

        h1{
            color:#d4a017;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        input{

            width:100%;

            padding:14px;

            margin:10px 0;

            border:1px solid #ddd;

            border-radius:10px;

            font-size:15px;
        }

        button{

            width:100%;

            padding:14px;

            border:none;

            border-radius:10px;

            background:#d4a017;

            color:white;

            font-size:16px;

            cursor:pointer;

            margin-top:15px;
        }

        button:hover{
            background:#b88a12;
        }

        .logo{
            font-size:50px;
            margin-bottom:15px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="logo">🛡️</div>

    <h1>CyberGuard AI</h1>

    <p>Cloud & IoT Security Assessment Platform</p>
    {% if error %}
<div style="
background:#ffe5e5;
color:#cc0000;
padding:10px;
border-radius:8px;
margin-bottom:15px;
font-weight:bold;
">
    ❌ {{ error }}
</div>
{% endif %}

    <form action="/" method="POST">

        <input
        type="email"
        name="email"
        placeholder="Email Address"
        required>

        <input
        type="password"
        name="password"
        placeholder="Password"
        required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>CyberGuard AI Register</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
            135deg,
            #1c2331,
            #2c3e50
            );
        }

        .container{

            width:450px;

            background:white;

            padding:40px;

            border-radius:20px;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.3);

            text-align:center;
        }

        .logo{
            font-size:50px;
            margin-bottom:10px;
        }

        h1{
            color:#d4a017;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        input{

            width:100%;

            padding:14px;

            margin:10px 0;

            border:1px solid #ddd;

            border-radius:10px;

            font-size:15px;
        }

        button{

            width:100%;

            padding:14px;

            margin-top:15px;

            border:none;

            border-radius:10px;

            background:#d4a017;

            color:white;

            font-size:16px;

            cursor:pointer;
        }

        button:hover{
            background:#b88a12;
        }

        .login-link{
            margin-top:15px;
            font-size:14px;
        }

        .login-link a{
            color:#d4a017;
            text-decoration:none;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="logo">🛡️</div>

    <h1>Create Account</h1>

    <p>Join CyberGuard AI</p>

    <form action="/register" method="POST">

        <input
        type="text"
        name="fullname"
        placeholder="Full Name"
        required>

        <input
        type="email"
        name="email"
        placeholder="Email Address"
        required>

        <input
        type="password"
        name="password"
        placeholder="Password"
        required>

        <button type="submit">
            Register
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="/">Login</a>
    </div>

</div>

</body>
</html>

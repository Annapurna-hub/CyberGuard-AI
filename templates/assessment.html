<!DOCTYPE html>

<html>
<head>
    <title>CyberGuard AI - Assessment</title>


<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        background:#1c2331;
        color:white;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .container{
        width:700px;
        background:#2b3446;
        padding:40px;
        border-radius:20px;
        box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    h1{
        text-align:center;
        color:#d4a017;
        margin-bottom:30px;
    }

    label{
        display:block;
        margin-top:15px;
        margin-bottom:8px;
    }

    select,input[type=range]{
        width:100%;
        padding:10px;
        border-radius:8px;
    }

    button{
        width:100%;
        margin-top:30px;
        padding:15px;
        border:none;
        border-radius:10px;
        background:#d4a017;
        color:white;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#b88a12;
    }

</style>


</head>

<body>

<div class="container">
    <div style="text-align:right; margin-bottom:20px;">

<a href="/" style="
background:#dc3545;
color:white;
text-decoration:none;
padding:10px 20px;
border-radius:8px;
font-weight:bold;
">

🚪 Logout

</a>

</div>


<h1>🛡 Cyber Risk Assessment</h1>

<form action="/results" method="POST">

    <label>Platform</label>

    <select name="platform">
        <option>AWS</option>
        <option>Azure</option>
        <option>IoT Device</option>
    </select>

    <label>
        Security Level (%):
        <span id="securityValue">50</span>%
    </label>

    <input
    type="range"
    min="0"
    max="100"
    value="50"
    id="securitySlider"
    name="security_level"
    oninput="updateValue()">

    <label>MFA</label>

    <select name="mfa">
        <option>Enabled</option>
        <option>Disabled</option>
    </select>

    <label>Encryption</label>

    <select name="encryption">
        <option>Enabled</option>
        <option>Disabled</option>
    </select>

    <label>Exposure Level</label>

    <select name="exposure">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
    </select>

    <label>Firmware Status</label>

    <select name="firmware">
        <option>Updated</option>
        <option>Outdated</option>
    </select>

    <div style="display:flex; gap:15px; margin-top:30px;">

<button type="submit">
    Analyze Risk
</button>

<a href="/history"
style="
flex:1;
background:#2ecc71;
color:white;
text-decoration:none;
padding:15px;
border-radius:10px;
text-align:center;
font-weight:bold;
">
View History
</a>

</div>

</form>


</div>

<script>

function updateValue() {
    document.getElementById("securityValue").innerText =
    document.getElementById("securitySlider").value;
}

</script>

</body>
</html>
